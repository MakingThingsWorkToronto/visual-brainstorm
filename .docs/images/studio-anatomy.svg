<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="system-ui, -apple-system, sans-serif">
  <!-- window -->
  <rect x="20" y="20" width="840" height="470" rx="14" fill="none" stroke="#8a8a94" stroke-width="2"/>

  <!-- left nav -->
  <line x1="185" y1="20" x2="185" y2="490" stroke="#8a8a94" stroke-width="1.5"/>
  <text x="36" y="50" font-size="11" font-weight="700" fill="#a855f7">DISCUSSIONS</text>
  <g fill="none" stroke="#8a8a94" stroke-width="1.5">
    <rect x="34" y="62" width="138" height="26" rx="6" stroke="#a855f7"/>
    <rect x="34" y="94" width="138" height="26" rx="6"/>
    <rect x="34" y="126" width="138" height="26" rx="6"/>
  </g>
  <circle cx="44" cy="75" r="3" fill="#22c55e" stroke="none"/>
  <text x="52" y="79" font-size="10" fill="#8a8a94">live session</text>
  <text x="42" y="111" font-size="10" fill="#8a8a94">cached thread</text>
  <text x="42" y="143" font-size="10" fill="#8a8a94">cached thread</text>
  <text x="36" y="176" font-size="11" font-weight="700" fill="#8a8a94">&#9656; ARCHIVE (3)</text>
  <text x="36" y="193" font-size="9.5" fill="#8a8a94">closed-out &#38; finalized</text>
  <text x="36" y="206" font-size="9.5" fill="#8a8a94">threads live here</text>

  <!-- header -->
  <line x1="185" y1="70" x2="860" y2="70" stroke="#8a8a94" stroke-width="1.5"/>
  <circle cx="212" cy="45" r="11" fill="#a855f7" opacity="0.25" stroke="none"/>
  <text x="212" y="49" text-anchor="middle" font-size="11">&#128161;</text>
  <text x="232" y="42" font-size="12" font-weight="700" fill="#a855f7">Visual Brainstorm</text>
  <text x="232" y="56" font-size="9.5" fill="#8a8a94">thread title &#183; connection dot</text>
  <g font-size="10" fill="#8a8a94">
    <rect x="520" y="32" width="98" height="24" rx="6" fill="#a855f7" opacity="0.85" stroke="none"/>
    <text x="569" y="48" text-anchor="middle" fill="#ffffff" font-weight="600">&#10010; New Brainstorm</text>
    <rect x="626" y="32" width="82" height="24" rx="6" fill="none" stroke="#8a8a94"/>
    <text x="667" y="48" text-anchor="middle">&#10024; Discover skills</text>
    <rect x="716" y="32" width="82" height="24" rx="6" fill="none" stroke="#8a8a94"/>
    <text x="757" y="48" text-anchor="middle">&#128230; Plan closeout</text>
    <rect x="806" y="32" width="20" height="24" rx="6" fill="none" stroke="#8a8a94"/>
    <text x="816" y="48" text-anchor="middle">&#129534;</text>
    <rect x="832" y="32" width="20" height="24" rx="6" fill="none" stroke="#8a8a94"/>
    <text x="842" y="47" text-anchor="middle" fill="#a855f7">&#9679;</text>
  </g>

  <!-- phase tabs -->
  <g font-size="9.5" text-anchor="middle">
    <rect x="330" y="86" width="74" height="22" rx="4" fill="#a855f7" stroke="none"/>
    <text x="367" y="101" fill="#ffffff" font-weight="700">DIVERGE</text>
    <rect x="408" y="90" width="64" height="18" rx="4" fill="none" stroke="#8a8a94"/>
    <text x="440" y="103" fill="#8a8a94">EXPAND</text>
    <rect x="476" y="90" width="58" height="18" rx="4" fill="none" stroke="#8a8a94"/>
    <text x="505" y="103" fill="#8a8a94">MUTATE</text>
    <rect x="538" y="90" width="52" height="18" rx="4" fill="none" stroke="#8a8a94"/>
    <text x="564" y="103" fill="#8a8a94">WRECK</text>
    <rect x="594" y="90" width="56" height="18" rx="4" fill="none" stroke="#8a8a94"/>
    <text x="622" y="103" fill="#8a8a94">CLUSTER</text>
    <rect x="654" y="90" width="64" height="18" rx="4" fill="none" stroke="#8a8a94"/>
    <text x="686" y="103" fill="#8a8a94">CONVERGE</text>
  </g>
  <text x="524" y="126" text-anchor="middle" font-size="9.5" fill="#8a8a94">&#8220;how to work this surface&#8221; guide &#8212; numbered steps, changes with the tab</text>
  <rect x="300" y="114" width="450" height="16" rx="4" fill="#8a8a94" opacity="0.12" stroke="none"/>

  <!-- option cards -->
  <g>
    <rect x="215" y="146" width="180" height="150" rx="10" fill="none" stroke="#a855f7" stroke-width="2"/>
    <rect x="227" y="156" width="156" height="86" rx="6" fill="#8a8a94" opacity="0.12" stroke="none"/>
    <circle cx="305" cy="199" r="28" fill="none" stroke="#a855f7" stroke-width="2.5"/>
    <text x="231" y="258" font-size="10.5" font-weight="600" fill="#a855f7">Option label &#10003;</text>
    <text x="231" y="271" font-size="9" fill="#8a8a94">one-line intent</text>
    <g font-size="9" fill="#8a8a94">
      <rect x="227" y="278" width="22" height="13" rx="3" fill="none" stroke="#8a8a94"/><text x="238" y="288" text-anchor="middle">&#9910;</text>
      <rect x="253" y="278" width="34" height="13" rx="3" fill="none" stroke="#8a8a94"/><text x="270" y="288" text-anchor="middle">&#9998; note</text>
      <rect x="291" y="278" width="38" height="13" rx="3" fill="none" stroke="#8a8a94"/><text x="310" y="288" text-anchor="middle">&#9889; remix</text>
    </g>

    <rect x="405" y="146" width="180" height="150" rx="10" fill="none" stroke="#8a8a94" stroke-width="1.5"/>
    <rect x="417" y="156" width="156" height="86" rx="6" fill="#8a8a94" opacity="0.12" stroke="none"/>
    <rect x="465" y="172" width="56" height="56" rx="8" fill="none" stroke="#8a8a94" stroke-width="2.5"/>
    <text x="421" y="258" font-size="10.5" font-weight="600" fill="#8a8a94">Option label</text>

    <rect x="595" y="146" width="180" height="150" rx="10" fill="none" stroke="#8a8a94" stroke-width="1.5"/>
    <rect x="607" y="156" width="156" height="86" rx="6" fill="#8a8a94" opacity="0.12" stroke="none"/>
    <path d="M683 174 L711 226 H655 Z" fill="none" stroke="#8a8a94" stroke-width="2.5"/>
    <text x="611" y="258" font-size="10.5" font-weight="600" fill="#8a8a94">Option label</text>
  </g>

  <!-- dials -->
  <rect x="215" y="310" width="560" height="58" rx="10" fill="none" stroke="#8a8a94" stroke-width="1.5"/>
  <g font-size="9" fill="#8a8a94">
    <text x="231" y="330">Playful</text><text x="360" y="330" text-anchor="end">Serious</text>
    <line x1="231" y1="340" x2="360" y2="340" stroke="#8a8a94" stroke-width="2"/>
    <circle cx="270" cy="340" r="5" fill="#a855f7" stroke="none"/>
    <text x="400" y="330">Minimal</text><text x="530" y="330" text-anchor="end">Detailed</text>
    <line x1="400" y1="340" x2="530" y2="340" stroke="#8a8a94" stroke-width="2"/>
    <circle cx="495" cy="340" r="5" fill="#a855f7" stroke="none"/>
    <text x="570" y="330">Flat</text><text x="700" y="330" text-anchor="end">Full glow</text>
    <line x1="570" y1="340" x2="700" y2="340" stroke="#8a8a94" stroke-width="2"/>
    <circle cx="635" cy="340" r="5" fill="#8a8a94" stroke="none"/>
    <text x="231" y="360" fill="#a855f7">&#9679; 2 dials moved &#8212; steers next round (a dial alone is a complete instruction)</text>
  </g>

  <!-- composer -->
  <rect x="215" y="382" width="560" height="88" rx="10" fill="none" stroke="#8a8a94" stroke-width="1.5"/>
  <rect x="227" y="392" width="536" height="30" rx="6" fill="#8a8a94" opacity="0.12" stroke="none"/>
  <text x="235" y="411" font-size="9.5" fill="#8a8a94">elaboration &#8212; optional; your gestures already speak</text>
  <g font-size="9.5" text-anchor="middle">
    <rect x="227" y="432" width="52" height="24" rx="6" fill="none" stroke="#8a8a94"/><text x="253" y="448" fill="#8a8a94">&#8617; Back</text>
    <rect x="285" y="432" width="104" height="24" rx="6" fill="#a855f7" stroke="none"/><text x="337" y="448" fill="#ffffff" font-weight="600">Send &#38; iterate &#8594;</text>
    <rect x="395" y="432" width="72" height="24" rx="6" fill="none" stroke="#8a8a94"/><text x="431" y="448" fill="#8a8a94">&#10003; Accept</text>
    <rect x="473" y="432" width="48" height="24" rx="6" fill="none" stroke="#8a8a94"/><text x="497" y="448" fill="#8a8a94">Park</text>
    <rect x="529" y="432" width="128" height="24" rx="6" fill="none" stroke="#a855f7" stroke-width="2"/><text x="593" y="448" fill="#a855f7" font-weight="700">&#127937; Finalize &#38; close out</text>
    <rect x="665" y="432" width="98" height="24" rx="6" fill="none" stroke="#8a8a94"/><text x="714" y="448" fill="#8a8a94">model: opus-4-8 &#9662;</text>
  </g>

  <!-- callouts -->
  <g font-size="10" fill="#8a8a94">
    <text x="800" y="160">&#9910; full-screen</text>
    <text x="800" y="173">zoom &#38; pan</text>
    <line x1="797" y1="164" x2="778" y2="170" stroke="#8a8a94" stroke-width="1" stroke-dasharray="3 3"/>
  </g>

  <text x="440" y="516" text-anchor="middle" font-size="11" fill="#8a8a94">every control feeds the response &#8212; nothing you touch is ever dropped (the feedback-packaging contract)</text>
</svg>
