name: Agent PR Format

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  agent-pr-format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: List changed files
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git diff --name-only "origin/$BASE_REF...HEAD" > "$RUNNER_TEMP/changed-files.txt"
      - name: Validate agent PR format
        run: node scripts/check-agent-format.mjs pr "$GITHUB_EVENT_PATH" "$RUNNER_TEMP/changed-files.txt"
