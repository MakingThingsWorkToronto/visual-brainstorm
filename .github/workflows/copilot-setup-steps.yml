name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - package-lock.json
      - apps/**
      - packages/**
      - tsconfig*.json
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - package-lock.json
      - apps/**
      - packages/**
      - tsconfig*.json

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build MCP servers and studio
        run: npm run build