name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/mcp.json
      - .github/hooks/**
      - .github/agents/**
      - .github/agentic-surface-registry.json
      - .github/prompts/**
      - .github/copilot-instructions.md
      - .vscode/**
      - .claude/agentic-surface-registry.json
      - .mcp.json
      - CLAUDE.md
      - AGENTS.md
      - package.json
      - package-lock.json
      - apps/**
      - packages/**
      - scripts/check-copilot-parity.mjs
      - scripts/copilot-hook.mjs
      - tests/copilot-mcp.test.mjs
      - tests/copilot-adapter.test.mjs
      - tsconfig*.json
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .github/mcp.json
      - .github/hooks/**
      - .github/agents/**
      - .github/agentic-surface-registry.json
      - .github/prompts/**
      - .github/copilot-instructions.md
      - .vscode/**
      - .claude/agentic-surface-registry.json
      - .mcp.json
      - CLAUDE.md
      - AGENTS.md
      - package.json
      - package-lock.json
      - apps/**
      - packages/**
      - scripts/check-copilot-parity.mjs
      - scripts/copilot-hook.mjs
      - tests/copilot-mcp.test.mjs
      - tests/copilot-adapter.test.mjs
      - tsconfig*.json

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build MCP servers and studio
        run: npm run build
      - name: Validate GitHub Copilot MCP parity
        run: npm run check:copilot-parity
      - name: Exercise Copilot MCP startup contracts
        run: node --test tests/copilot-mcp.test.mjs
      - name: Validate Copilot prompt and agent adapters
        run: node --test tests/copilot-adapter.test.mjs