<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 270" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="fa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- funnel silhouette -->
  <path d="M30 40 L850 95 L850 155 L30 230 Z" fill="#a855f7" opacity="0.07" stroke="none"/>

  <!-- phase columns -->
  <g font-size="14" font-weight="700" fill="#a855f7" text-anchor="middle">
    <text x="95" y="26">Diverge</text>
    <text x="235" y="26">Expand</text>
    <text x="375" y="26">Mutate</text>
    <text x="515" y="26">Wreck</text>
    <text x="655" y="26">Cluster</text>
    <text x="795" y="26">Converge</text>
  </g>
  <g stroke="#8a8a94" stroke-width="1" stroke-dasharray="3 4">
    <line x1="165" y1="34" x2="165" y2="238"/>
    <line x1="305" y1="34" x2="305" y2="238"/>
    <line x1="445" y1="34" x2="445" y2="238"/>
    <line x1="585" y1="34" x2="585" y2="238"/>
    <line x1="725" y1="34" x2="725" y2="238"/>
  </g>

  <g font-size="10.5" fill="#8a8a94" text-anchor="middle">
    <text x="95" y="120">airy grid,</text>
    <text x="95" y="134">no ceilings</text>
    <text x="95" y="158" fill="#a855f7">picks &#8594; pure</text>
    <text x="95" y="171" fill="#a855f7">syntheses</text>

    <text x="235" y="120">select what</text>
    <text x="235" y="134">resonates</text>
    <text x="235" y="158" fill="#a855f7">pool GROWS,</text>
    <text x="235" y="171" fill="#a855f7">nothing removed</text>

    <text x="375" y="120">one option,</text>
    <text x="375" y="134">distortion lenses</text>
    <text x="375" y="158" fill="#a855f7">&#8220;reveals something&#8221;</text>
    <text x="375" y="171" fill="#a855f7">gets baked in</text>

    <text x="515" y="120">nothing is precious:</text>
    <text x="515" y="134">&#8805;3 flaws open the gate</text>
    <text x="515" y="158" fill="#a855f7">flaws return</text>
    <text x="515" y="171" fill="#a855f7">as fixes</text>

    <text x="655" y="120">drag to group &#8212;</text>
    <text x="655" y="134">distance IS data</text>
    <text x="655" y="158" fill="#a855f7">? gaps spawn</text>
    <text x="655" y="171" fill="#a855f7">hybrids</text>

    <text x="795" y="120">keep / kill / merge</text>
    <text x="795" y="134">every option</text>
    <text x="795" y="158" fill="#a855f7">crown &#127937; Final &#8594;</text>
    <text x="795" y="171" fill="#a855f7">auto plan-closeout</text>
  </g>

  <!-- flow arrow -->
  <line x1="40" y1="200" x2="836" y2="200" stroke="#a855f7" stroke-width="2" marker-end="url(#fa)" opacity="0.85"/>
  <text x="440" y="222" text-anchor="middle" font-size="10.5" fill="#8a8a94">tabs are clickable &#8212; you can steer the funnel yourself &#183; &#8617; Back rewinds any round &#183; kills never return</text>

  <text x="440" y="252" text-anchor="middle" font-size="11" fill="#8a8a94">many wild options in &#8594; one crowned answer out</text>
</svg>
