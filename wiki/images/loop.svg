<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#a855f7"/>
    </marker>
    <marker id="arrg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8a8a94"/>
    </marker>
  </defs>

  <!-- You -->
  <rect x="40" y="110" width="170" height="86" rx="14" fill="none" stroke="#8a8a94" stroke-width="2"/>
  <text x="125" y="145" text-anchor="middle" font-size="16" font-weight="700" fill="#a855f7">You</text>
  <text x="125" y="166" text-anchor="middle" font-size="11" fill="#8a8a94">taste &#183; judgment &#183; selection</text>
  <text x="125" y="181" text-anchor="middle" font-size="11" fill="#8a8a94">pressure</text>

  <!-- Claude -->
  <rect x="345" y="42" width="180" height="86" rx="14" fill="none" stroke="#8a8a94" stroke-width="2"/>
  <text x="435" y="77" text-anchor="middle" font-size="16" font-weight="700" fill="#a855f7">Claude Code</text>
  <text x="435" y="98" text-anchor="middle" font-size="11" fill="#8a8a94">generates divergent SVG options</text>
  <text x="435" y="113" text-anchor="middle" font-size="11" fill="#8a8a94">interprets every gesture</text>

  <!-- Studio -->
  <rect x="650" y="110" width="175" height="86" rx="14" fill="none" stroke="#8a8a94" stroke-width="2"/>
  <text x="737" y="145" text-anchor="middle" font-size="16" font-weight="700" fill="#a855f7">Studio (browser)</text>
  <text x="737" y="166" text-anchor="middle" font-size="11" fill="#8a8a94">select &#183; note &#183; remix &#183; dials</text>
  <text x="737" y="181" text-anchor="middle" font-size="11" fill="#8a8a94">drag &#183; wreck &#183; triage &#183; &#127937;</text>

  <!-- Cache -->
  <path d="M355 232 v46 a90 14 0 0 0 180 0 v-46" fill="none" stroke="#8a8a94" stroke-width="2"/>
  <ellipse cx="445" cy="232" rx="90" ry="14" fill="none" stroke="#8a8a94" stroke-width="2"/>
  <text x="445" y="262" text-anchor="middle" font-size="12" font-weight="600" fill="#a855f7">discussion/&#60;thread&#62;</text>
  <text x="445" y="278" text-anchor="middle" font-size="10" fill="#8a8a94">every round &#183; every SVG &#183; brainstorm.md &#183; artifacts</text>

  <!-- 1: You -> Claude -->
  <path d="M170 108 Q 230 60 340 72" fill="none" stroke="#a855f7" stroke-width="2" marker-end="url(#arr)"/>
  <text x="235" y="55" font-size="11" font-weight="600" fill="#a855f7">1 &#183; prompt (+ clarifying questions)</text>

  <!-- 2: Claude -> Studio -->
  <path d="M528 72 Q 640 60 705 106" fill="none" stroke="#a855f7" stroke-width="2" marker-end="url(#arr)"/>
  <text x="555" y="55" font-size="11" font-weight="600" fill="#a855f7">2 &#183; present_board (MCP &#8594; WS)</text>

  <!-- 3: Studio -> You -->
  <path d="M648 175 Q 435 210 213 172" fill="none" stroke="#8a8a94" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="430" y="185" text-anchor="middle" font-size="11" fill="#8a8a94">3 &#183; you answer visually &#8212; no typing required</text>

  <!-- 4: response back to Claude -->
  <path d="M240 128 Q 300 118 342 106" fill="none" stroke="#a855f7" stroke-width="2" marker-end="url(#arr)"/>
  <text x="243" y="112" font-size="11" font-weight="600" fill="#a855f7">4 &#183; response &#8594; next round</text>

  <!-- cache links -->
  <path d="M435 130 L442 216" fill="none" stroke="#8a8a94" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="452" y="185" font-size="10" fill="#8a8a94">cached forever</text>

  <text x="430" y="308" text-anchor="middle" font-size="11" fill="#8a8a94">repeat 1&#8211;4 until you crown a &#127937; Final &#8212; artifacts land in your repo with full lineage</text>
</svg>
